name: mi39-dev
channels:
  - conda-forge
dependencies:
  - python=3.11
  - ninja
  - numpy
  - pytest
  - matplotlib
  - pip
# NOTE: do NOT install cmake from conda (v4 breaks mitsuba3 submodule
# builds); use the system cmake 3.26.x with
#   -DCMAKE_POLICY_VERSION_MINIMUM=3.5
# Compiler: gcc-toolset-13 (gcc 13.3.1). CUDA 12.8 driver stack for
# cuda_ad_rgb; llvm_ad_rgb needs DRJIT_LIBLLVM_PATH=/usr/lib64/libLLVM-17.so.
